<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#05060f; font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  @keyframes fadein { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .spin { animation: spin 1s linear infinite; display:inline-block; }
  .live-dot { width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;display:inline-block;margin-right:5px; }
  .card { animation: fadein 0.3s ease; }
  ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:#0f172a; } ::-webkit-scrollbar-thumb { background:#312e81; border-radius:2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const fmt = (n) => n == null ? "—" : Number(n).toLocaleString("ko-KR", {maximumFractionDigits:0});
const fgColor = v => v>=75?"#22c55e":v>=55?"#86efac":v>=45?"#facc15":v>=25?"#f97316":"#ef4444";
const fgLabel = v => v>=75?"극도 탐욕":v>=55?"탐욕":v>=45?"중립":v>=25?"공포":"극도 공포";

function Gauge({value=50}) {
  const r=48,cx=65,cy=68;
  const segs=["#ef4444","#f97316","#facc15","#86efac","#22c55e"];
  const pt=(pct)=>({x:cx+r*Math.cos(Math.PI*(1-pct)),y:cy-r*Math.sin(Math.PI*(1-pct))});
  const arc=(s,e)=>{const p1=pt(s),p2=pt(e);return `M ${p1.x} ${p1.y} A ${r} ${r} 0 0 1 ${p2.x} ${p2.y}`;};
  const needle=pt(value/100); const col=fgColor(value);
  return (
    <svg width={160} height={95} viewBox="0 0 130 90">
      {segs.map((c,i)=><path key={i} d={arc(i/5,(i+1)/5)} stroke={c} strokeWidth={9} fill="none" strokeLinecap="round" opacity={0.35}/>)}
      <path d={arc(0,value/100)} stroke={col} strokeWidth={9} fill="none" strokeLinecap="round"/>
      <line x1={cx} y1={cy} x2={needle.x} y2={needle.y} stroke={col} strokeWidth={2.5} strokeLinecap="round"/>
      <circle cx={cx} cy={cy} r={4} fill={col}/>
      <text x={cx} y={cy+16} textAnchor="middle" fill={col} fontSize={15} fontWeight={800}>{value}</text>
    </svg>
  );
}

const TABS=["⚡ BTC 시세","😨 공포탐욕","🏆 시총순위","🏛 대사관","🚗 로보택시"];
const TAB_COLORS=["#6366f1","#f97316","#f59e0b","#22c55e","#3b82f6"];

const MCAP_DATA=[
  {rank:1, name:"Gold",      sym:"GOLD", cap:"$35.98T",p:"$5,175", ch:"-0.07%",up:false},
  {rank:2, name:"Silver",    sym:"SLVR", cap:"$4.83T", p:"$85.72", ch:"+0.22%",up:true},
  {rank:3, name:"NVIDIA",    sym:"NVDA", cap:"$4.52T", p:"$186.03",ch:"+0.68%",up:true},
  {rank:4, name:"Apple",     sym:"AAPL", cap:"$3.83T", p:"$260.81",ch:"-0.01%",up:false},
  {rank:5, name:"Alphabet",  sym:"GOOG", cap:"$3.73T", p:"$308.42",ch:"+0.49%",up:true},
  {rank:6, name:"Microsoft", sym:"MSFT", cap:"$3.01T", p:"$404.88",ch:"-0.22%",up:false},
  {rank:7, name:"Amazon",    sym:"AMZN", cap:"$2.28T", p:"$212.65",ch:"-0.78%",up:false},
  {rank:8, name:"TSMC",      sym:"TSM",  cap:"$1.84T", p:"$354.56",ch:"+2.15%",up:true},
  {rank:9, name:"Aramco",    sym:"2222", cap:"$1.75T", p:"$7.24",  ch:"+0.97%",up:true},
  {rank:10,name:"VTI ETF",   sym:"VTI",  cap:"$1.70T", p:"$264.62",ch:"+0.02%",up:true},
  {rank:13,name:"⭐ Tesla",  sym:"TSLA", cap:"$1.53T", p:"$407.82",ch:"+2.15%",up:true, hl:true},
  {rank:14,name:"⭐ Bitcoin",sym:"BTC",  cap:"$1.40T", p:"$69,838",ch:"-0.30%",up:false,hl:true},
];

const EMBASSY=[
  {flag:"🇺🇸",name:"미국",  status:"철수 소식 없음",safe:true},
  {flag:"🇨🇳",name:"중국",  status:"철수 소식 없음",safe:true},
  {flag:"🇯🇵",name:"일본",  status:"철수 소식 없음",safe:true},
  {flag:"🇷🇺",name:"러시아",status:"철수 소식 없음",safe:true},
];

const ROBOTAXI=[
  {region:"Bay Area (SF)",count:355,note:"안전요원 탑승 감독형",color:"#3b82f6"},
  {region:"Austin, TX",  count:45, note:"무감독 전환 진행 중", color:"#10b981"},
  {region:"Austin (완전무감독)",count:8,note:"Level 4 완전 자율",color:"#f59e0b"},
];

function App() {
  const [tab,setTab]=useState(0);
  const [btcUsdt,setBtcUsdt]=useState(null);
  const [btcKrw,setBtcKrw]=useState(null);
  const [usdKrw,setUsdKrw]=useState(1482);
  const [fng,setFng]=useState(32);
  const [loading,setLoading]=useState(false);
  const [lastUpdate,setLastUpdate]=useState(null);
  const [errors,setErrors]=useState({});

  const kimchi = btcUsdt && btcKrw && usdKrw
    ? (((btcKrw/usdKrw)-btcUsdt)/btcUsdt*100).toFixed(2)
    : null;

  const fetchAll = useCallback(async () => {
    setLoading(true);
    const errs={};

    // BTC/USDT Binance
    try {
      const r=await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");
      const d=await r.json();
      setBtcUsdt(parseFloat(d.price));
    } catch(e){ errs.btc=true; }

    // BTC/KRW Upbit
    try {
      const r=await fetch("https://api.upbit.com/v1/ticker?markets=KRW-BTC");
      const d=await r.json();
      if(d[0]?.trade_price) setBtcKrw(d[0].trade_price);
    } catch(e){ errs.upbit=true; }

    // USD/KRW
    try {
      const r=await fetch("https://api.exchangerate-api.com/v4/latest/USD");
      const d=await r.json();
      if(d.rates?.KRW) setUsdKrw(d.rates.KRW);
    } catch(e){ errs.fx=true; }

    // Fear & Greed
    try {
      const r=await fetch("https://api.alternative.me/fng/?limit=1");
      const d=await r.json();
      setFng(parseInt(d.data[0].value));
    } catch(e){ errs.fng=true; }

    setErrors(errs);
    setLastUpdate(new Date().toLocaleTimeString("ko-KR"));
    setLoading(false);
  },[]);

  useEffect(()=>{ fetchAll(); const id=setInterval(fetchAll,30000); return ()=>clearInterval(id); },[]);

  const S={
    wrap:{background:"#05060f",minHeight:"100vh",color:"#e2e8f0",padding:"16px 12px 60px",maxWidth:720,margin:"0 auto"},
    card:{background:"#0f172a",borderRadius:14,padding:"14px 18px",border:"1px solid #1e293b",marginBottom:10},
    label:{fontSize:10,color:"#475569",marginBottom:3},
    bigNum:{fontSize:24,fontWeight:900,color:"#e2e8f0",letterSpacing:-0.5},
  };

  return (
    <div style={S.wrap}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div>
          <div style={{fontSize:10,color:"#4f46e5",letterSpacing:3,textTransform:"uppercase"}}>실시간 올인원</div>
          <div style={{fontSize:22,fontWeight:900,background:"linear-gradient(90deg,#818cf8,#38bdf8,#34d399)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>My Dashboard</div>
        </div>
        <button onClick={fetchAll} disabled={loading} style={{padding:"7px 14px",borderRadius:999,border:"1px solid #312e81",background:"#1e1b4b",color:"#818cf8",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
          <span className={loading?"spin":""}>↻</span> {lastUpdate||"로딩 중…"}
        </button>
      </div>

      {/* BTC 가격 헤더 */}
      <div style={{background:"linear-gradient(135deg,#0f172a,#1a1040)",borderRadius:16,padding:"16px 18px",marginBottom:14,border:"1px solid #312e81"}}>
        <div style={{fontSize:10,color:"#64748b",marginBottom:10}}>
          <span className="live-dot"/>BTC 실시간 · 30초 자동갱신
          {errors.btc&&<span style={{color:"#f87171",marginLeft:8}}>⚠ Binance 오류</span>}
          {errors.upbit&&<span style={{color:"#f87171",marginLeft:8}}>⚠ Upbit 오류</span>}
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          <div style={{flex:1,minWidth:120,background:"#0f172a",borderRadius:12,padding:"10px 14px"}}>
            <div style={S.label}>원화 (KRW) {errors.upbit?"⚠":""}</div>
            <div style={S.bigNum}>₩{btcKrw?fmt(btcKrw):"로딩…"}</div>
            <div style={{fontSize:10,color:"#334155",marginTop:2}}>{btcKrw?(btcKrw/1e8).toFixed(4)+"억원":"—"}</div>
          </div>
          <div style={{flex:1,minWidth:120,background:"#0f172a",borderRadius:12,padding:"10px 14px"}}>
            <div style={S.label}>테더 (USDT)</div>
            <div style={S.bigNum}>${btcUsdt?fmt(btcUsdt):"로딩…"}</div>
            <div style={{fontSize:10,color:"#334155",marginTop:2}}>환율 ₩{fmt(usdKrw)}</div>
          </div>
          <div style={{minWidth:110,background:"#0f172a",borderRadius:12,padding:"10px 14px",textAlign:"center",border:`1px solid ${kimchi>=0?"#166534":"#7f1d1d"}`}}>
            <div style={S.label}>김치프리미엄</div>
            <div style={{fontSize:22,fontWeight:900,color:kimchi===null?"#64748b":kimchi>=0?"#22c55e":"#f87171"}}>
              {kimchi===null?"계산중…":`${kimchi>=0?"+":""}${kimchi}%`}
            </div>
            <div style={{fontSize:10,color:"#475569",marginTop:2}}>{kimchi===null?"":kimchi>=0?"김프 🇰🇷":"역프 📉"}</div>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:3,marginBottom:12,background:"#0f172a",borderRadius:999,padding:3,border:"1px solid #1e293b"}}>
        {TABS.map((t,i)=>(
          <button key={i} onClick={()=>setTab(i)} style={{flex:1,padding:"8px 2px",borderRadius:999,border:"none",background:tab===i?TAB_COLORS[i]:"transparent",color:tab===i?"#fff":"#64748b",fontWeight:tab===i?700:400,fontSize:10,cursor:"pointer",transition:"all 0.2s",fontFamily:"inherit"}}>{t}</button>
        ))}
      </div>

      {/* TAB 0: BTC 상세 */}
      {tab===0&&<div className="card">
        <div style={S.card}>
          <div style={{fontSize:11,color:"#64748b",marginBottom:10}}>⛏ BTC 채굴 원가 vs 현재가</div>
          <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <div><div style={S.label}>채굴 원가 (추정)</div><div style={{fontSize:22,fontWeight:900,color:"#fbbf24"}}>$78,000</div></div>
            <div style={{fontSize:20,color:"#334155"}}>vs</div>
            <div><div style={S.label}>현재 시세</div><div style={{fontSize:22,fontWeight:900,color:btcUsdt>78000?"#22c55e":"#f87171"}}>${btcUsdt?fmt(btcUsdt):"…"}</div></div>
            <div style={{marginLeft:"auto",padding:"8px 14px",borderRadius:10,background:btcUsdt>78000?"#052e16":"#450a0a",border:`1px solid ${btcUsdt>78000?"#166534":"#7f1d1d"}`,color:btcUsdt>78000?"#4ade80":"#f87171",fontWeight:700,fontSize:13}}>
              {btcUsdt?(btcUsdt>78000?"✅ 원가 위":"🔴 원가 하회"):"—"}
            </div>
          </div>
          <div style={{marginTop:10,height:6,background:"#1e293b",borderRadius:999,overflow:"hidden"}}>
            <div style={{width:`${Math.min((btcUsdt/100000)*100,100)}%`,background:"linear-gradient(90deg,#f87171,#fbbf24,#4ade80)",height:"100%",borderRadius:999,transition:"width 0.6s"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#334155",marginTop:3}}><span>$0</span><span>채굴원가 $78K</span><span>$100K</span></div>
        </div>
        <div style={S.card}>
          <div style={{fontSize:11,color:"#64748b",marginBottom:8}}>🏦 거래소 BTC 보유량 (CryptoQuant)</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontSize:26,fontWeight:900,color:"#f59e0b"}}>2.35M BTC</div><div style={{fontSize:11,color:"#475569",marginTop:3}}>전체 거래소 합산</div></div>
            <div style={{padding:"8px 14px",borderRadius:10,background:"#052e16",border:"1px solid #166534",textAlign:"center"}}>
              <div style={{fontSize:14,fontWeight:800,color:"#4ade80"}}>▼ 감소세</div>
              <div style={{fontSize:10,color:"#475569",marginTop:2}}>장기 추세</div>
            </div>
          </div>
          <div style={{marginTop:10,padding:"9px 12px",background:"#1e293b",borderRadius:8,fontSize:12,color:"#94a3b8",lineHeight:1.7}}>
            📌 보유량 감소 = 투자자 개인지갑 이동 → <span style={{color:"#4ade80"}}>매도 압력 감소 신호</span>
          </div>
        </div>
      </div>}

      {/* TAB 1: 공포탐욕 */}
      {tab===1&&<div className="card">
        <div style={S.card}>
          <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>가상자산 공포·탐욕 지수 (alternative.me · 실시간)</div>
          {errors.fng&&<div style={{fontSize:11,color:"#f87171",marginBottom:8}}>⚠ API 오류 — 최근값 표시</div>}
          <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
            <Gauge value={fng}/>
            <div style={{fontSize:26,fontWeight:900,color:fgColor(fng),marginTop:-4}}>{fgLabel(fng)}</div>
            <div style={{fontSize:13,color:"#475569",marginTop:4}}>지수: {fng} / 100</div>
          </div>
          <div style={{display:"flex",gap:4,marginTop:16,justifyContent:"center",flexWrap:"wrap"}}>
            {[["극도공포","#ef4444"],["공포","#f97316"],["중립","#facc15"],["탐욕","#86efac"],["극도탐욕","#22c55e"]].map(([l,c])=>(
              <div key={l} style={{display:"flex",alignItems:"center",gap:3,fontSize:10,color:"#64748b"}}>
                <div style={{width:8,height:8,borderRadius:2,background:c}}/><span>{l}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={S.card}>
          <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>CNN 금융시장 공포·탐욕 지수</div>
          <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
            <Gauge value={25}/>
            <div>
              <div style={{fontSize:22,fontWeight:900,color:fgColor(25)}}>극도 공포</div>
              <div style={{fontSize:13,color:"#475569"}}>지수: 25 / 100</div>
              <div style={{fontSize:11,color:"#334155",marginTop:6}}>주식·채권·옵션 시장 심리 종합</div>
            </div>
          </div>
        </div>
      </div>}

      {/* TAB 2: 시총순위 */}
      {tab===2&&<div className="card" style={{background:"#0f172a",borderRadius:14,border:"1px solid #1e293b",overflow:"hidden"}}>
        <div style={{padding:"12px 18px",borderBottom:"1px solid #1e293b",fontSize:11,color:"#64748b"}}>🏆 글로벌 시가총액 순위 (8marketcap.com · 금/은 포함 전체)</div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:"#1e293b"}}>
            {["#","자산","시총","가격","24h"].map(h=><th key={h} style={{padding:"8px 10px",color:"#475569",fontWeight:600,textAlign:h=="#"?"center":"right",whiteSpace:"nowrap"}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {MCAP_DATA.map((row,i)=>(
              <tr key={i} style={{borderBottom:"1px solid #1e293b",background:row.hl?"#1a1040":"transparent"}}>
                <td style={{padding:"9px 10px",textAlign:"center",color:row.hl?"#818cf8":"#475569",fontWeight:row.hl?700:400}}>{row.rank}</td>
                <td style={{padding:"9px 10px"}}>
                  <div style={{fontWeight:600,color:row.hl?"#c4b5fd":"#e2e8f0"}}>{row.name}</div>
                  <div style={{fontSize:10,color:"#334155"}}>{row.sym}</div>
                </td>
                <td style={{padding:"9px 10px",textAlign:"right",color:"#64748b",fontSize:11}}>{row.cap}</td>
                <td style={{padding:"9px 10px",textAlign:"right",fontWeight:600,color:"#e2e8f0"}}>{row.p}</td>
                <td style={{padding:"9px 10px",textAlign:"right",color:row.up?"#22c55e":"#f87171",fontWeight:600}}>{row.ch}</td>
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{padding:"8px 14px",fontSize:10,color:"#334155"}}>⭐ Bitcoin 14위 · Tesla 13위 (금·은·ETF 포함 전체 순위 기준)</div>
      </div>}

      {/* TAB 3: 대사관 */}
      {tab===3&&<div className="card">
        <div style={S.card}>
          <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>🏛 주한 대사관 철수 모니터 (embassywatch.gkuer.com)</div>
          <div style={{fontSize:10,color:"#334155",marginBottom:14}}>AI가 6시간마다 자동 확인</div>
          {EMBASSY.map((e,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 14px",borderRadius:10,background:"#1e293b",border:`1px solid ${e.safe?"#166534":"#7f1d1d"}`,marginBottom:8}}>
              <div style={{fontSize:16,fontWeight:700}}>{e.flag} {e.name}</div>
              <div style={{padding:"4px 14px",borderRadius:999,fontSize:12,fontWeight:700,background:e.safe?"#052e16":"#450a0a",color:e.safe?"#4ade80":"#f87171"}}>
                {e.safe?"✅ ":"🚨 "}{e.status}
              </div>
            </div>
          ))}
          <div style={{padding:"9px 12px",background:"#1e293b",borderRadius:8,fontSize:11,color:"#475569",lineHeight:1.7,marginTop:4}}>
            📌 전체 91개 주한 대사관 <span style={{color:"#4ade80"}}>철수 소식 없음</span> (2026.03.12 기준)
          </div>
        </div>
      </div>}

      {/* TAB 4: 로보택시 */}
      {tab===4&&<div className="card">
        <div style={S.card}>
          <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>🚗 Tesla 로보택시 플릿 현황 (robotaxitracker.com)</div>
          <div style={{fontSize:10,color:"#334155",marginBottom:16}}>2026.03.10 기준</div>
          <div style={{display:"flex",justifyContent:"center",marginBottom:20}}>
            <div style={{textAlign:"center",background:"#1e293b",borderRadius:12,padding:"16px 32px"}}>
              <div style={{fontSize:48,fontWeight:900,color:"#3b82f6",lineHeight:1}}>400</div>
              <div style={{fontSize:13,color:"#94a3b8",marginTop:4}}>총 활성 차량</div>
            </div>
          </div>
          {ROBOTAXI.map((row,i)=>(
            <div key={i} style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:13,fontWeight:600,color:"#e2e8f0"}}>{row.region}</span>
                <span style={{fontSize:13,fontWeight:800,color:row.color}}>{row.count}대</span>
              </div>
              <div style={{background:"#1e293b",borderRadius:999,height:10,overflow:"hidden"}}>
                <div style={{width:`${(row.count/355)*100}%`,background:`linear-gradient(90deg,${row.color}88,${row.color})`,height:"100%",borderRadius:999}}/>
              </div>
              <div style={{fontSize:11,color:"#475569",marginTop:4}}>{row.note}</div>
            </div>
          ))}
